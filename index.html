    <main>
        <section class="produto_imagens">
            <img class="produto_imagem" id="imagem_maior" src="assets/image-product-1.jpg" alt="">
            <div class="produto_imagens_miniaturas">
                <img class="produto_imagem_miniatura" src="assets/image-product-1-thumbnail.jpg" alt="">
                <img class="produto_imagem_miniatura" src="assets/image-product-2-thumbnail.jpg" alt="">

                <img class="produto_imagem_miniatura" src="assets/image-product-4-thumbnail.jpg" alt="">
            </div>
            <div id="produto_imagens_botoes">
                <img class="produto_imagens_seta"  src="assets/icon-previous.svg" alt="">
                <img class="produto_imagens_seta"  src="assets/icon-next.svg" alt="">
            </div>
        </section>
        <section id="produto_informacoes">
            <div id="produto_informacoes_titulo">
                <p id="produto_informacoes_titulo_marca">SNEAKER COMPANY</p>
                <h2 id="produto_informacoes_titulo_nome">Fall Limited Edition Sneakers</h2>
            </div>
            <p id="produto_informacoes_descricao">These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they'll withstand everything the weather can offer.</p>
            <div id="produto_informacoes_valores">
                <div id="valor">
                    <p id="valor_atual">$125.00</p>
                    <p id="valor_desconto">50%</p>
                </div>
                <p id="valor_antigo">$250.00</p>
            </div>
            <div id="produto_informacoes_adicionar">
                <div id="produto_informacoes_adicionar_quantidade">
                    <img id="quantidade_menos_img" src="assets/icon-minus.svg" alt="">
                    <p id="quantidade">0</p>
                    <img id="quantidade_mais_img" src="assets/icon-plus.svg" alt="">
                </div>
                <button id="produto_informacoes_adicionar_btn">
                    <img id="adicionar_btn_icone" src="assets/icon-cart.svg" alt="">
                    <p id="adicionar_btn_text">Add to cart</p>
                </button>
            </div>    
        </section>

    <section id="lightbox">
        <section class="produto_imagens produto_imagens_lightbox">
            <img id="lightbox_fechar_img" src="assets/icon-close-lightbox.svg" alt="Ícone de fechar o lightbox">
            <img id="imagem_maior_lightbox" class="produto_imagem" alt="">
            <div class="produto_imagens_miniaturas">
                <img class="produto_imagem_miniatura" src="assets/image-product-1-thumbnail.jpg" alt="">
                <img class="produto_imagem_miniatura" src="assets/image-product-2-thumbnail.jpg" alt="">
